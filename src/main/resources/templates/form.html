<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produto</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="/css/style.css">

<style>
	
</style>
</head>

<body>

	<!-- SIDEBAR -->
	<div class="sidebar">
	    <h2>🧸 ToyStore</h2>

	    <a href="/" class="active">🏠 Home</a>
	    <a href="/catalogo">🛒 Catálogo</a>
	    <a th:if="${session.usuarioLogado != null and session.usuarioLogado.tipo == 'FUNCIONARIO'}" href="/admin">⚙️ Administração</a>
	    <a href="/sobre">👥 Sobre</a>
	    
		<!-- LOGIN / USUÁRIO -->
		<div class="login-separator"></div>

		<!-- NÃO LOGADO -->
		<div th:if="${session.usuarioLogado == null}">
		    <a href="/login" class="login-item">
		        🔐 Fazer login
		    </a>
		</div>

		<!-- LOGADO -->
		<div th:if="${session.usuarioLogado != null}" class="login-item user-logado">

		    <div style="display:flex; flex-direction:column; gap:6px; width:100%;">

				<a href="/perfil" class="user-link">
				    👋 <span th:text="${session.usuarioLogado.nome}">Usuário</span>
				</a>

		        <span style="font-size:12px; opacity:0.9;">
		            Bem-vindo de volta
		        </span>

		        <a href="/logout"
		           style="margin-top:8px; text-align:center; background:#ef4444; color:white; padding:6px; border-radius:8px; font-size:13px;">
		            Sair
		        </a>

		    </div>

		</div>
	</div>

<!-- MAIN -->
<div class="main">

    <!-- HEADER -->
    <div class="header">
        <h1 th:text="${produto.id != null} ? 'Editar Produto' : 'Novo Produto'"></h1>
    </div>

    <!-- CONTAINER -->
    <div class="container">
		<div th:if="${erro}" style="color:red; margin-bottom:15px;">
		    <p th:text="${erro}"></p>
		</div>
        <div class="form-card">

            <form method="post" action="/admin/salvar" enctype="multipart/form-data">
				
				<input type="hidden" name="id" th:value="${produto.id}">
				
                <div class="form-grid">
					
					
                    <div>
                        <label>Código</label>
						<input type="text" name="codigo"
						       th:value="${produto?.codigo}"
						       th:readonly="${produto.id != null}">
                    </div>

                    <div>
                        <label>Valor</label>
						<input type="number" step="0.01" name="valor" th:value="${produto?.valor}">
                    </div>

                    <div class="full">
                        <label>Descrição</label>
                        <input type="text" name="descricao" th:value="${produto?.descricao}">
                    </div>

                    <div>
						<label>Categoria</label>
						<select name="categoria">
						    <option value="">Selecione...</option>

						    <option value="Bonecos"
						        th:selected="${produto?.categoria == 'Bonecos'}">Bonecos</option>

						    <option value="Carrinhos"
						        th:selected="${produto?.categoria == 'Carrinhos'}">Carrinhos</option>

						    <option value="Educativos"
						        th:selected="${produto?.categoria == 'Educativos'}">Educativos</option>

						    <option value="Pelúcia"
						        th:selected="${produto?.categoria == 'Pelúcia'}">Pelúcia</option>
						</select>
                    </div>

                    <div>
                        <label>Marca</label>
                        <input type="text" name="marca" th:value="${produto?.marca}">
                    </div>

					<div class="full">

					    <label>Imagem</label>

					    <!-- MOSTRA IMAGEM ATUAL (SÓ NA EDIÇÃO) -->
					    <div th:if="${produto.id != null and produto.imagem != null}">
					        
					        <p style="font-size:14px; color:#555;">Imagem atual:</p>

					        <img th:src="@{'/img/' + ${produto.imagem}}"
					             style="width:120px; border-radius:10px; margin:10px 0;">

					        <p style="font-size:12px; color:#777;">
					            <span th:text="${produto.imagem}"></span>
					        </p>

					    </div>

					    <!-- INPUT FILE (SEMPRE EXISTE) -->
					    <input type="file" name="imagemFile"
					           th:required="${produto.id == null}">
					</div>

                    <div class="full">
                        <label>Detalhes</label>
                        <textarea name="detalhes" th:text="${produto?.detalhes}"></textarea>
                    </div>

                </div>

                <div class="actions">
                    <button type="submit" class="btn salvar"
                        th:text="${produto.id != null} ? 'Atualizar' : 'Salvar'">
                    </button>

                    <button type="button" class="btn cancelar" onclick="history.back()">
                        Cancelar
                    </button>
                </div>

            </form>

        </div>

    </div>

</div>

</body>
</html>
